
<div style="width:100%;height:520px;position:relative;border-radius:var(--border-radius-lg);overflow:hidden;background:#050510;">
  <canvas id="c4" style="width:100%;height:100%;display:block;"></canvas>
  <div style="position:absolute;bottom:12px;left:16px;font-size:12px;color:rgba(255,255,255,0.3);font-family:var(--font-mono);">1000 cubes · drag to orbit · scroll to zoom</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const canvas=document.getElementById('c4');
  const container=canvas.parentElement;
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(container.clientWidth,container.clientHeight);

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(50,container.clientWidth/container.clientHeight,0.1,500);

  scene.add(new THREE.AmbientLight(0xffffff,0.35));
  const dirLight=new THREE.DirectionalLight(0xffffff,1.2);
  dirLight.position.set(20,30,20);
  scene.add(dirLight);
  const pointLight=new THREE.PointLight(0x4488ff,1.2,80);
  pointLight.position.set(-10,10,-10);
  scene.add(pointLight);

  const geo=new THREE.BoxGeometry(0.6,0.6,0.6);
  const cubes=[];
  const N=10,spacing=2.2,offset=((N-1)*spacing)/2;

  for(let x=0;x<N;x++)for(let y=0;y<N;y++)for(let z=0;z<N;z++){
    const nx=x/(N-1),ny=y/(N-1),nz=z/(N-1);
    const hue=(nx*0.55+ny*0.3+nz*0.15)%1;
    const color=new THREE.Color().setHSL(hue,0.85,0.55);
    const mat=new THREE.MeshPhongMaterial({color,emissive:color,emissiveIntensity:0.45,shininess:95,specular:new THREE.Color(0xaaaaaa)});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(x*spacing-offset,y*spacing-offset,z*spacing-offset);
    cubes.push({mesh,speed:{x:(Math.random()-0.5)*0.04+0.01,y:(Math.random()-0.5)*0.035+0.008,z:(Math.random()-0.5)*0.025+0.005},phase:Math.random()*Math.PI*2});
    scene.add(mesh);
  }

  let isDragging=false,prevMouse={x:0,y:0};
  let spherical={theta:0.6,phi:0.9,radius:38};
  function updateCamera(){
    camera.position.x=spherical.radius*Math.sin(spherical.phi)*Math.sin(spherical.theta);
    camera.position.y=spherical.radius*Math.cos(spherical.phi);
    camera.position.z=spherical.radius*Math.sin(spherical.phi)*Math.cos(spherical.theta);
    camera.lookAt(0,0,0);
  }
  updateCamera();

  canvas.addEventListener('mousedown',e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY};});
  window.addEventListener('mouseup',()=>isDragging=false);
  window.addEventListener('mousemove',e=>{
    if(!isDragging)return;
    spherical.theta-=(e.clientX-prevMouse.x)*0.008;
    spherical.phi=Math.max(0.1,Math.min(Math.PI-0.1,spherical.phi+(e.clientY-prevMouse.y)*0.008));
    prevMouse={x:e.clientX,y:e.clientY};
    updateCamera();
  });
  canvas.addEventListener('wheel',e=>{
    spherical.radius=Math.max(15,Math.min(70,spherical.radius+e.deltaY*0.05));
    updateCamera();
    e.preventDefault();
  },{passive:false});

  new ResizeObserver(()=>{
    const w=container.clientWidth,h=container.clientHeight;
    renderer.setSize(w,h);
    camera.aspect=w/h;
    camera.updateProjectionMatrix();
  }).observe(container);

  function animate(){
    requestAnimationFrame(animate);
    const time=Date.now()*0.001;
    for(const {mesh,speed,phase} of cubes){
      mesh.rotation.x=Math.sin(time*1.2+phase)*0.8+time*speed.x;
      mesh.rotation.y=time*speed.y*1.3;
      mesh.rotation.z=Math.cos(time*0.9+phase)*0.6+time*speed.z*0.7;
    }
    renderer.render(scene,camera);
  }
  animate();
})();
</script>
